<!doctype html>
<html>
    <head>
        <link
            rel="icon"
            type="image/x-icon"
            href="/favicon.ico"
        />

        <link
            rel="stylesheet"
            href="./xterm.css"
        />
        <script src="./xterm.js"></script>
        <script src="./xterm-addon-fit.js"></script>
        <script src="./xterm-addon-webgl.js"></script>
        <script src="./xterm-addon-web-links.js"></script>
        <script src="./xterm-addon-search.js"></script>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #1e1e1e;
            }
            #terminal {
                width: calc(100% - 8px);
                height: calc(100% - 8px);
                padding: 4px;
                overflow: hidden;
            }
            .disconnected {
                opacity: 0.2;
            }
            #search-bar {
                display: none;
                position: fixed;
                top: 8px;
                right: 24px;
                z-index: 100;
                background: #252526;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 4px 8px;
            }
            #search-bar.visible {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            #paste-dialog {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 200;
                background: rgba(0, 0, 0, 0.6);
                align-items: center;
                justify-content: center;
            }
            #paste-dialog.visible {
                display: flex;
            }
            #paste-box {
                background: #252526;
                border: 1px solid #555;
                border-radius: 6px;
                padding: 16px;
                width: 420px;
                max-width: 90%;
            }
            #paste-box label {
                color: #d4d4d4;
                font-family: sans-serif;
                font-size: 13px;
                display: block;
                margin-bottom: 8px;
            }
            #paste-area {
                width: 100%;
                height: 120px;
                background: #1e1e1e;
                color: #d4d4d4;
                border: 1px solid #555;
                border-radius: 3px;
                padding: 6px;
                font-family: Consolas, "Courier New", monospace;
                font-size: 13px;
                resize: vertical;
                outline: none;
                box-sizing: border-box;
            }
            #paste-area:focus {
                border-color: #007acc;
            }
            #paste-buttons {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 10px;
            }
            #search-input {
                background: #1e1e1e;
                color: #d4d4d4;
                border: 1px solid #555;
                border-radius: 2px;
                padding: 3px 6px;
                font-size: 13px;
                outline: none;
                width: 220px;
            }
            #search-input:focus {
                border-color: #007acc;
            }
            .search-btn {
                background: #333;
                color: #d4d4d4;
                border: 1px solid #555;
                border-radius: 2px;
                padding: 3px 8px;
                cursor: pointer;
                font-size: 12px;
            }
            .search-btn:hover {
                background: #444;
            }
            /* scrollbar */
            *::-webkit-scrollbar-track {
                background-color: #1e1e1e;
            }
            *::-webkit-scrollbar {
                width: 10px;
                background-color: #1e1e1e;
            }
            *::-webkit-scrollbar-thumb {
                background-color: #444;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div id="search-bar">
            <input
                id="search-input"
                type="text"
                placeholder="Search..."
            />
            <button
                class="search-btn"
                id="search-prev"
            >&#9650;</button>
            <button
                class="search-btn"
                id="search-next"
            >&#9660;</button>
            <button
                class="search-btn"
                id="search-close"
            >&#10005;</button>
        </div>
        <div id="paste-dialog">
            <div id="paste-box">
                <label>Paste text into terminal (Ctrl+V here, then press Send):</label>
                <textarea id="paste-area" autofocus></textarea>
                <div id="paste-buttons">
                    <button class="search-btn" id="paste-cancel">Cancel</button>
                    <button class="search-btn" id="paste-send" style="background:#007acc;border-color:#007acc">Send</button>
                </div>
            </div>
        </div>
        <div id="terminal"></div>
        <script>
            let resizeTimeout;
            let ws;
            let connectTimer;
            let connectingTimeout;
            const terminalDiv = document.getElementById('terminal');

            const term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                scrollback: 5000,
                fontSize: 14,
                fontFamily: 'Consolas, "Courier New", monospace',
                allowProposedApi: true,
                theme: {
                    background: '#1e1e1e',
                    foreground: '#d4d4d4',
                    cursor: '#d4d4d4',
                    cursorAccent: '#1e1e1e',
                    selectionBackground: '#264f78',
                    selectionForeground: '#ffffff',
                    black: '#1e1e1e',
                    red: '#f44747',
                    green: '#6a9955',
                    yellow: '#d7ba7d',
                    blue: '#569cd6',
                    magenta: '#c586c0',
                    cyan: '#4ec9b0',
                    white: '#d4d4d4',
                    brightBlack: '#808080',
                    brightRed: '#f44747',
                    brightGreen: '#6a9955',
                    brightYellow: '#d7ba7d',
                    brightBlue: '#569cd6',
                    brightMagenta: '#c586c0',
                    brightCyan: '#4ec9b0',
                    brightWhite: '#ffffff',
                },
            });

            terminalDiv.className = 'disconnected';

            // Addons
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);

            const searchAddon = new SearchAddon.SearchAddon();
            term.loadAddon(searchAddon);

            term.open(terminalDiv);

            // Try WebGL renderer, ignore if unsupported
            try {
                const webglAddon = new WebglAddon.WebglAddon();
                webglAddon.onContextLoss(() => webglAddon.dispose());
                term.loadAddon(webglAddon);
            } catch (e) {
                console.warn('WebGL addon not available, using default renderer');
            }

            fitAddon.fit();

            // Search bar
            const searchBar = document.getElementById('search-bar');
            const searchInput = document.getElementById('search-input');
            const searchPrev = document.getElementById('search-prev');
            const searchNext = document.getElementById('search-next');
            const searchClose = document.getElementById('search-close');

            function openSearch() {
                searchBar.classList.add('visible');
                searchInput.focus();
                searchInput.select();
            }

            function closeSearch() {
                searchBar.classList.remove('visible');
                searchAddon.clearDecorations();
                term.focus();
            }

            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.shiftKey ? searchAddon.findPrevious(searchInput.value) : searchAddon.findNext(searchInput.value);
                } else if (e.key === 'Escape') {
                    closeSearch();
                }
            });
            searchPrev.addEventListener('click', () => searchAddon.findPrevious(searchInput.value));
            searchNext.addEventListener('click', () => searchAddon.findNext(searchInput.value));
            searchClose.addEventListener('click', closeSearch);

            // Copy to clipboard with fallback for HTTP
            function copyToClipboard(text) {
                if (navigator.clipboard?.writeText) {
                    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }

            // Copy on select (PuTTY-style)
            let lastSelection = '';
            term.onSelectionChange(() => {
                const selected = term.getSelection();
                if (selected.length) {
                    lastSelection = selected;
                    copyToClipboard(selected);
                }
            });

            // Paste dialog (fallback for non-secure contexts)
            const pasteDialog = document.getElementById('paste-dialog');
            const pasteArea = document.getElementById('paste-area');
            const pasteSend = document.getElementById('paste-send');
            const pasteCancel = document.getElementById('paste-cancel');

            function openPasteDialog() {
                pasteArea.value = '';
                pasteDialog.classList.add('visible');
                pasteArea.focus();
            }

            function closePasteDialog() {
                pasteDialog.classList.remove('visible');
                term.focus();
            }

            function sendPaste() {
                const text = pasteArea.value;
                if (text && ws) {
                    ws.send(JSON.stringify({ method: 'key', key: text }));
                }
                closePasteDialog();
            }

            pasteSend.addEventListener('click', sendPaste);
            pasteCancel.addEventListener('click', closePasteDialog);
            pasteArea.addEventListener('keydown', e => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendPaste();
                } else if (e.key === 'Escape') {
                    closePasteDialog();
                }
            });
            pasteDialog.addEventListener('click', e => {
                if (e.target === pasteDialog) {
                    closePasteDialog();
                }
            });

            // Right-click paste
            terminalDiv.addEventListener('contextmenu', event => {
                event.preventDefault();
                if (navigator.clipboard?.readText) {
                    navigator.clipboard.readText().then(text => {
                        if (text && ws) {
                            ws.send(JSON.stringify({ method: 'key', key: text }));
                        }
                    }).catch(() => openPasteDialog());
                } else {
                    openPasteDialog();
                }
            });

            // All keystrokes go straight to the PTY
            term.onData(data => {
                if (ws) {
                    ws.send(JSON.stringify({ method: 'key', key: data }));
                }
            });

            // Ctrl+Shift+F for search, Ctrl+Shift+V for paste dialog
            term.attachCustomKeyEventHandler(e => {
                if (e.type !== 'keydown' || !e.ctrlKey || !e.shiftKey) {
                    return true;
                }
                if (e.key === 'F') {
                    openSearch();
                    return false;
                }
                if (e.key === 'V') {
                    if (!navigator.clipboard?.readText) {
                        openPasteDialog();
                        return false;
                    }
                }
                return true;
            });

            function reconnect(noWait) {
                terminalDiv.className = 'disconnected';

                connectTimer =
                    connectTimer ||
                    setTimeout(
                        () => {
                            connectTimer = null;
                            if (connectingTimeout) {
                                clearTimeout(connectingTimeout);
                            }
                            connectingTimeout = setTimeout(() => {
                                console.log('Connect timeout');
                                reconnect();
                            }, 5000);

                            ws = new WebSocket(
                                `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.hostname}:${window.location.port}`,
                            );
                            ws.onopen = function () {
                                if (connectingTimeout) {
                                    clearTimeout(connectingTimeout);
                                    connectingTimeout = null;
                                }
                                console.log('Connected');
                                terminalDiv.className = '';
                                // Send initial terminal size
                                ws.send(JSON.stringify({ method: 'resize', cols: term.cols, rows: term.rows }));
                            };

                            ws.onerror = function (error) {
                                console.error('Cannot connect: ' + error);
                                try {
                                    ws.close();
                                    ws = null;
                                } catch (e) {}
                                reconnect();
                            };

                            ws.onclose = function () {
                                try {
                                    ws.close();
                                    ws = null;
                                } catch (e) {}
                                reconnect();
                            };

                            ws.onmessage = msg => {
                                const parsed = JSON.parse(msg.data);
                                if (parsed.data !== undefined) {
                                    term.write(parsed.data);
                                }
                            };
                        },
                        noWait ? 0 : 5000,
                    );
            }

            window.addEventListener(
                'resize',
                () => {
                    if (resizeTimeout) {
                        clearTimeout(resizeTimeout);
                    }
                    resizeTimeout = setTimeout(function () {
                        resizeTimeout = null;
                        fitAddon.fit();
                        try {
                            ws && ws.send(JSON.stringify({ method: 'resize', cols: term.cols, rows: term.rows }));
                        } catch (e) {}
                    }, 150);
                },
                true,
            );

            reconnect(true);
        </script>
    </body>
</html>
